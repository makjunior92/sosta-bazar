name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sosta
          POSTGRES_PASSWORD: sosta
          POSTGRES_DB: sosta_bazar
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt ruff pytest httpx
      - run: ruff check app worker tests
      - env:
          DATABASE_URL: postgresql+asyncpg://sosta:sosta@localhost:5432/sosta_bazar
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v

  backend-docker:
    name: Backend Docker
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: sosta-bazar-backend:latest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  frontend-docker:
    name: Frontend Docker
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: sosta-bazar-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
