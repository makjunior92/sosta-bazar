name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/makjunior92/sosta-bazar-backend
  FRONTEND_IMAGE: ghcr.io/makjunior92/sosta-bazar-frontend
  DEPLOY_URL: https://quantumflux.cloud/sostabazar
  DEPLOY_BASE_PATH: /sostabazar

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sosta
          POSTGRES_PASSWORD: sosta
          POSTGRES_DB: sosta_bazar
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt ruff pytest httpx
      - run: ruff check backend/app backend/worker backend/tests
      - env:
          DATABASE_URL: postgresql+asyncpg://sosta:sosta@localhost:5432/sosta_bazar
          REDIS_URL: redis://localhost:6379/0
        run: pytest backend/tests/ -v

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - env:
          NEXT_PUBLIC_API_URL: ${{ env.DEPLOY_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ env.DEPLOY_BASE_PATH }}
        run: npm run build
        working-directory: frontend

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.DEPLOY_URL }}
            NEXT_PUBLIC_BASE_PATH=${{ env.DEPLOY_BASE_PATH }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull images and restart stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/opt/sosta-bazar
            if [[ ! -d "$APP_DIR/.git" ]]; then
              git clone https://github.com/makjunior92/sosta-bazar.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd deploy
            chmod +x deploy.sh
            ./deploy.sh
